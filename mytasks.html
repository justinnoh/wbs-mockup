<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 업무 관리 - WBS 목업</title>
<link rel="stylesheet" href="_shared.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
</head>
<body>
<div class="page">
  <div class="topbar"><a href="index.html">&larr; 목업 목록</a><span class="tiny muted">내 업무 관리</span></div>

  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px;">
    <div style="background:#f1efe8; border-radius:8px; padding:1rem;"><div class="tiny muted">진행중 프로젝트</div><div style="font-size:24px; font-weight:500; margin-top:4px;">4</div></div>
    <div style="background:#f1efe8; border-radius:8px; padding:1rem;"><div class="tiny muted">이번주 마감</div><div style="font-size:24px; font-weight:500; margin-top:4px;">7</div></div>
    <div style="background:#f1efe8; border-radius:8px; padding:1rem;"><div class="tiny muted">오늘 마감</div><div style="font-size:24px; font-weight:500; margin-top:4px; color:#A32D2D;">2</div></div>
    <div style="background:#f1efe8; border-radius:8px; padding:1rem;"><div class="tiny muted">다음주 마감</div><div style="font-size:24px; font-weight:500; margin-top:4px;">5</div></div>
  </div>

  <div style="margin-bottom:20px;">
    <div style="font-size:14px; font-weight:500; margin-bottom:8px;"><i class="ti ti-at"></i> 응답 요청 <span class="tiny muted">— 나를 멘션한 항목</span></div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div style="border:1px solid #d3d1c7; border-radius:8px; padding:10px 12px; display:flex; align-items:center; gap:10px;">
        <div style="width:26px; height:26px; border-radius:50%; background:#E6F1FB; color:#0C447C; font-size:11px; font-weight:500; display:flex; align-items:center; justify-content:center; flex-shrink:0;">김민</div>
        <div style="flex:1; font-size:13px;">
          <strong>김민수</strong>님이 <span class="muted">홈페이지 리뉴얼 · 디자인팀</span>에서 확인을 요청했습니다
          <div class="muted tiny" style="margin-top:2px;">"1차 시안 첨부합니다. 확인 부탁드려요"</div>
        </div>
        <div style="display:flex; gap:4px;">
          <button style="padding:4px 10px;"><i class="ti ti-check"></i> 승인</button>
          <button style="padding:4px 10px;"><i class="ti ti-message"></i> 답장</button>
        </div>
      </div>
      <div style="border:1px solid #d3d1c7; border-radius:8px; padding:10px 12px; display:flex; align-items:center; gap:10px;">
        <div style="width:26px; height:26px; border-radius:50%; background:#FAEEDA; color:#633806; font-size:11px; font-weight:500; display:flex; align-items:center; justify-content:center; flex-shrink:0;">최서</div>
        <div style="flex:1; font-size:13px;">
          <strong>최서연</strong>님이 <span class="muted">신제품 런칭 · 개발 단계</span>에서 확인을 요청했습니다
          <div class="muted tiny" style="margin-top:2px;">"API 스펙 검토 부탁드립니다"</div>
        </div>
        <div style="display:flex; gap:4px;">
          <button style="padding:4px 10px;"><i class="ti ti-check"></i> 승인</button>
          <button style="padding:4px 10px;"><i class="ti ti-paperclip"></i> 첨부</button>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
      <div style="font-size:14px; font-weight:500;">내 업무</div>
      <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:#5f5e5a;">
        <input type="checkbox" id="showDone" onchange="toggleDone()"> 완료 표시
      </label>
    </div>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
      <div>
        <div class="tiny muted" style="margin-bottom:6px;">예약</div>
        <div style="background:#f1efe8; border-radius:8px; padding:10px; font-size:12px;">
          <div style="font-weight:500;">킥오프 문서 작성</div>
          <div class="muted" style="margin-top:4px;">시작 7/8</div>
        </div>
      </div>
      <div>
        <div class="tiny muted" style="margin-bottom:6px;">진행중</div>
        <div style="background:#f1efe8; border-radius:8px; padding:10px; font-size:12px; margin-bottom:6px;">
          <div style="font-weight:500;">시안 디자인</div>
          <div style="margin-top:6px;"><span style="font-size:10px; padding:2px 6px; background:#FCEBEB; color:#791F1F; border-radius:4px;">긴급</span></div>
          <div class="muted" style="margin-top:4px;">마감 오늘</div>
        </div>
        <div style="background:#f1efe8; border-radius:8px; padding:10px; font-size:12px;">
          <div style="font-weight:500;">API 명세 검토</div>
          <div class="muted" style="margin-top:4px;">마감 7/6</div>
        </div>
      </div>
      <div>
        <div class="tiny muted" style="margin-bottom:6px;">정지</div>
        <div style="background:#f1efe8; border-radius:8px; padding:10px; font-size:12px;">
          <div style="font-weight:500;">외부 연동 검증</div>
          <div class="muted" style="margin-top:4px;">보류중</div>
        </div>
      </div>
    </div>
    <div id="doneCol" style="display:none; margin-top:10px;">
      <div class="tiny muted" style="margin-bottom:6px;">완료</div>
      <div style="background:#f1efe8; border-radius:8px; padding:10px; font-size:12px; opacity:0.7;">
        <div style="font-weight:500; text-decoration:line-through;">회의록 정리</div>
        <div class="muted" style="margin-top:4px;">완료 7/2</div>
      </div>
    </div>
  </div>
</div>
<script>
function toggleDone(){
  document.getElementById('doneCol').style.display = document.getElementById('showDone').checked ? 'block' : 'none';
}
</script>
</body>
</html>
